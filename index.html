<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Alvorecer: Disseminando a Palavra de Deus e transformando vidas através dos livros, cursos e mentorias de Alexandre Gomes da Costa. Encontre propósito, fé e crescimento espiritual em Cristo.">
    <meta name="keywords" content="Alvorecer, Alexandre Gomes da Costa, livros cristãos, cursos bíblicos, mentoria espiritual, fé, propósito, transformação, devocional, igreja, ministério">
    <meta name="author" content="Alexandre Gomes da Costa">
    <title>Alvorecer - Fé, Propósito e Transformação em Cristo</title>
    
    <link rel="stylesheet" href="/src/index.css"> 
    
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;700&family=Great+Vibes&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />

    <link rel="icon" type="image/svg+xml" href="/vite.svg" /> 
</head>
<body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const popup = document.getElementById('popup');
            if (popup) { // Verifica se o pop-up existe no DOM
                const closeBtn = document.querySelector('.popup-close');
                const discoverLink = document.querySelector('.discover-link');
                setTimeout(() => popup.style.display = 'block', 1000);

                closeBtn.addEventListener('click', () => popup.style.display = 'none');
                discoverLink.addEventListener('click', () => popup.style.display = 'none');
                window.addEventListener('click', (e) => {
                    if (e.target === popup) {
                        popup.style.display = 'none';
                    }
                });
            }
        });
    </script>
</body>
</html>
